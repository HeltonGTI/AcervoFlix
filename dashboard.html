<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | GameVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' };
    </script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div class="flex min-h-screen">
      <aside class="hidden w-72 border-r border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-900 lg:block">
        <a href="./dashboard.html" class="flex items-center gap-3">
          <span class="flex h-11 w-11 items-center justify-center rounded-md bg-teal-600 text-white">
            <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect width="20" height="12" x="2" y="6" rx="2" />
              <line x1="6" x2="10" y1="11" y2="11" />
              <line x1="8" x2="8" y1="9" y2="13" />
              <line x1="15" x2="15.01" y1="12" y2="12" />
              <line x1="18" x2="18.01" y1="10" y2="10" />
            </svg>
          </span>
          <div>
            <p class="text-lg font-black text-slate-950 dark:text-white">GameVault</p>
            <p class="text-xs font-semibold uppercase tracking-wide text-teal-700 dark:text-teal-300">Biblioteca de games</p>
          </div>
        </a>

        <nav class="mt-8 space-y-2">
          <a href="./dashboard.html" class="flex items-center gap-3 rounded-md bg-teal-50 px-3 py-2 text-sm font-bold text-teal-800 dark:bg-teal-400/10 dark:text-teal-200">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect width="7" height="9" x="3" y="3" rx="1" /><rect width="7" height="5" x="14" y="3" rx="1" /><rect width="7" height="9" x="14" y="12" rx="1" /><rect width="7" height="5" x="3" y="16" rx="1" /></svg>
            Dashboard
          </a>
        </nav>
      </aside>

      <main class="min-w-0 flex-1">
        <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 px-4 py-4 backdrop-blur dark:border-slate-800 dark:bg-slate-900/90 sm:px-6">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <p id="usuario-logado" class="text-sm font-semibold text-teal-700 dark:text-teal-300">Carregando usuario...</p>
              <h1 class="text-2xl font-black text-slate-950 dark:text-white">Jogos cadastrados</h1>
            </div>
            <div class="flex flex-wrap gap-2">
              <button id="btn-dark" type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-md border border-slate-200 bg-white text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800" title="Alternar modo dark" aria-label="Alternar modo dark">
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" /></svg>
              </button>
              <button id="btn-novo-jogo" type="button" class="inline-flex items-center gap-2 rounded-md bg-teal-600 px-4 py-2 text-sm font-bold text-white shadow-sm transition hover:bg-teal-700" aria-label="Cadastrar novo jogo">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14" /><path d="M12 5v14" /></svg>
                Novo Jogo
              </button>
              <button id="btn-logout" type="button" class="inline-flex items-center gap-2 rounded-md border border-red-200 bg-white px-4 py-2 text-sm font-bold text-red-700 transition hover:bg-red-50 dark:border-red-900 dark:bg-slate-900 dark:text-red-300 dark:hover:bg-red-950/30" aria-label="Sair da conta">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><path d="m16 17 5-5-5-5" /><path d="M21 12H9" /></svg>
                Sair
              </button>
            </div>
          </div>
        </header>

        <section class="px-4 py-6 sm:px-6">
          <div class="grid gap-4 md:grid-cols-3">
            <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
              <p class="text-sm font-semibold text-slate-500 dark:text-slate-400">Total de jogos</p>
              <strong id="stat-total" class="mt-2 block text-3xl font-black text-slate-950 dark:text-white">0</strong>
            </article>
            <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
              <p class="text-sm font-semibold text-slate-500 dark:text-slate-400">Valor da biblioteca</p>
              <strong id="stat-valor" class="mt-2 block text-3xl font-black text-slate-950 dark:text-white">R$ 0,00</strong>
            </article>
            <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
              <p class="text-sm font-semibold text-slate-500 dark:text-slate-400">Plataformas</p>
              <strong id="stat-plataformas" class="mt-2 block text-3xl font-black text-slate-950 dark:text-white">0</strong>
            </article>
          </div>

          <div class="mt-6 overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <div class="flex flex-col gap-3 border-b border-slate-200 p-4 dark:border-slate-800 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <h2 class="text-lg font-black text-slate-950 dark:text-white">Catalogo</h2>
                <p id="total-jogos" class="text-sm text-slate-500 dark:text-slate-400">Carregando registros...</p>
              </div>
              <div class="relative">
                <svg class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></svg>
                <input id="busca-jogos" type="search" placeholder="Buscar jogo..." class="w-full rounded-md border border-slate-200 bg-white py-2 pl-9 pr-3 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white sm:w-72" />
              </div>
            </div>
            <div id="mensagem-dashboard" class="hidden border-b border-slate-200 px-4 py-3 text-sm dark:border-slate-800"></div>
            <div class="overflow-x-auto">
              <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 text-xs font-bold uppercase tracking-wide text-slate-500 dark:bg-slate-950 dark:text-slate-400">
                  <tr>
                    <th class="px-4 py-3">Titulo</th>
                    <th class="px-4 py-3">Genero</th>
                    <th class="px-4 py-3">Plataforma</th>
                    <th class="px-4 py-3">Preco</th>
                    <th class="px-4 py-3">Lancamento</th>
                    <th class="px-4 py-3 text-right">Acoes</th>
                  </tr>
                </thead>
                <tbody id="tabela-jogos" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="modal-jogo" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4">
      <div class="w-full max-w-xl rounded-lg bg-white p-5 shadow-2xl dark:bg-slate-900">
        <div class="mb-5 flex items-center justify-between">
          <h2 id="titulo-modal" class="text-xl font-black text-slate-950 dark:text-white">Novo jogo</h2>
          <button id="btn-fechar-modal" type="button" class="rounded-md border border-slate-200 p-2 text-slate-500 transition hover:bg-slate-50 dark:border-slate-700 dark:hover:bg-slate-800" title="Fechar" aria-label="Fechar modal">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>
        <form id="form-jogo" class="grid gap-4 sm:grid-cols-2">
          <input type="hidden" id="jogo-id" />
          <label class="block sm:col-span-2">
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Titulo</span>
            <input id="titulo" type="text" required maxlength="120" class="mt-2 w-full rounded-md border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white" />
          </label>
          <label class="block">
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Genero</span>
            <input id="genero" type="text" required placeholder="RPG, Acao..." class="mt-2 w-full rounded-md border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white" />
          </label>
          <label class="block">
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Plataforma</span>
            <input id="plataforma" type="text" required placeholder="PC, PS5, Switch..." class="mt-2 w-full rounded-md border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white" />
          </label>
          <label class="block">
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Preco</span>
            <input id="preco" type="number" min="0" step="0.01" placeholder="199.90" class="mt-2 w-full rounded-md border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white" />
          </label>
          <label class="block">
            <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Lancamento</span>
            <input id="lancamento" type="date" class="mt-2 w-full rounded-md border border-slate-200 px-3 py-2.5 text-sm outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white" />
          </label>
          <div id="mensagem-formulario" class="hidden rounded-md px-3 py-2 text-sm sm:col-span-2"></div>
          <div class="flex justify-end gap-2 sm:col-span-2">
            <button id="btn-cancelar" type="button" class="rounded-md border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">Cancelar</button>
            <button id="btn-salvar" type="submit" class="rounded-md bg-teal-600 px-4 py-2 text-sm font-bold text-white transition hover:bg-teal-700">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="./js/games.js"></script>
  </body>
</html>
